name: Cloud DevOps CI Pipeline

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Verify Python installation
        run: python --version

      - name: Verify application syntax
        run: python -m py_compile app/app.py

      - name: Build Docker image
        run: docker build -t cloud-devops-ci-cd-lab:ci .